    <div class="container">

        <!-- Input -->
        <div class="input-area">

        <!-- Stats -->

            <div class="stat-box">

                <span id="leftCount">0</span>
                <p>Remaining</p>
            </div>

    <script>
        const colors = ['#ff6b6b', '#feca57', '#48dbfb', '#ff9ff3', '#54a0ff', '#5f27cd', '#00d2d3', '#1dd1a1'];
        let selectedColor = colors[0];
        let tasks = JSON.parse(localStorage.getItem('tasks')) || [];

        // Build color picker
        const picker = document.getElementById('colorPicker');
        colors.forEach(color => {
            const btn = document.createElement('div');
            btn.className = 'color-btn' + (color === selectedColor ? ' selected' : '');
            btn.style.background = color;
            btn.onclick = () => {
                selectedColor = color;
                document.querySelectorAll('.color-btn').forEach(b => b.classList.remove('selected'));
                btn.classList.add('selected');
            };
            picker.appendChild(btn);
        });

        function saveTasks() {
            localStorage.setItem('tasks', JSON.stringify(tasks));
        }

        function updateStats() {
            const done = tasks.filter(t => t.done).length;
            document.getElementById('totalCount').textContent = tasks.length;
            document.getElementById('doneCount').textContent = done;
            document.getElementById('leftCount').textContent = tasks.length - done;
        }

        function renderTasks() {
            const list = document.getElementById('taskList');
            list.innerHTML = '';

            tasks.forEach((task, index) => {
                const item = document.createElement('div');
                item.className = 'task-item' + (task.done ? ' done' : '');
                item.style.borderLeftColor = task.color;

                item.innerHTML = 
                    <input type="checkbox" class="task-checkbox" ${task.done ? 'checked' : ''} onchange="toggleTask(${index})">
                    <span class="task-text">${task.text}</span>
                    <button class="delete-btn" onclick="deleteTask(${index})">🗑️</button>
                ;
                list.appendChild(item);
            });

            updateStats();
        }

        function addTask() {
            const input = document.getElementById('taskInput');
            const text = input.value.trim();
            if (!text) return;

            tasks.push({ text, color: selectedColor, done: false });
            input.value = '';
            saveTasks();
            renderTasks();
        }

        function toggleTask(index) {
            tasks[index].done = !tasks[index].done;
            saveTasks();
            renderTasks();
        }

        function deleteTask(index) {
            tasks.splice(index, 1);
            saveTasks();
            renderTasks();
        }

        function clearAll() {
            if (tasks.length === 0) return;
            if (confirm('Delete all tasks?')) {
                tasks = [];
                saveTasks();
                renderTasks();
            }
        }

        // Add on Enter key
        document.getElementById('taskInput').addEventListener('keypress', e => {
            if (e.key === 'Enter') addTask();
        });

        renderTasks();
    </script>
