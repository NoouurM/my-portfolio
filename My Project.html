<!DOCTYPE html>
<html>
<head>
    <title>My Projects</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f8ff;
            margin: 0;
            padding: 0;
            text-align: center;
        }

        /* Navbar */
        nav {
            background-color: #cc0066;
            padding: 15px;
            text-align: center;
        }

        nav a {
            color: white;
            margin: 0 15px;
            text-decoration: none;
            font-weight: bold;
            font-size: 18px;
            transition: 0.3s;
        }

        nav a:hover {
            color: #ffccdd;
            transform: scale(1.05);
        }

        h1 {
            margin: 20px 0;
            color: #cc0066;
        }

        /* Projects */
        .project-card {
            display: inline-block;
            width: 250px;
            background-color: #fff;
            margin: 15px;
            padding: 15px;
            border-radius: 10px;
            box-shadow: 0 0 10px gray;
            transition: 0.3s;
            vertical-align: top;
        }

        .project-card:hover {
            transform: scale(1.05);
            box-shadow: 0 0 20px gray;
        }

        .project-card img {
            width: 100%;
            border-radius: 10px;
        }

        .project-card h3 {
            margin: 10px 0 5px;
            color: #cc0066;
        }

        .project-card p {
            color: #333;
            font-size: 14px;
        }

        .project-card a {
            display: inline-block;
            margin-top: 10px;
            color: white;
            background-color: #cc0066;
            padding: 8px 15px;
            border-radius: 8px;
            text-decoration: none;
            transition: 0.3s;
        }

        .project-card a:hover {
            background-color: #ff3399;
        }
    </style>
</head>
<body>

    <!-- Navbar -->
    <nav>
        <a href="index.html">Home</a>
        <a href="about.html">About</a>
        <a href="projects.html">Projects</a>

    </nav>

        <a href="#">View Project</a>
    </div>

</body>
</html>
