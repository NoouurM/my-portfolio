<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Quotes App Pro</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">

    <h2>💬 Quote Generator</h2>

    <div class="card">
      <p id="quote">Click New Quote ✨</p>
      <span id="author"></span>
    </div>

    <div class="buttons">
      <button onclick="getQuote()">✨ New</button>
      <button onclick="copyQuote()">📋 Copy</button>
      <button onclick="shareQuote()">🔗 Share</button>
      <button onclick="saveQuote()">⭐ Save</button>
      <button onclick="toggleMode()">🌙 Mode</button>
      <button onclick="clearFavorites()">🗑️ Clear</button>
    </div>

    <h3>⭐ Favorites</h3>
    <ul id="favList"></ul>

  </div>

  <div id="toast"></div>

  <script src="script.js"></script>
</body>
</html>
