<style>
body{
    font-family:Arial;
    background:#0a0f1e;
    color:white;
    margin:0;
}
nav{
    text-align:center;
    padding:15px;
    background:#111;
}
nav a{
    color:white;
    margin:0 15px;
    text-decoration:none;
    transition:0.3s;
}
nav a:hover{ color:#ff69b4; }
h1{ text-align:center; margin:30px 0; }
.container{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:25px;
    padding:40px;
}
.card{
    background:#111;
    border-radius:12px;
    overflow:hidden;
    transition:0.4s;
    position:relative;
}
.card:hover{
    transform:translateY(-12px);
    box-shadow:0 15px 35px rgba(255,105,180,0.4);
}
.card img{
    width:100%;
    height:170px;
    object-fit:cover;
    transition:0.5s;
}
.card:hover img{ transform:scale(1.1); }
.card-content{ padding:15px; }
.card h3{ margin:10px 0; }
.card p{ color:#aaa; font-size:14px; }
.btn{
    display:inline-block;
    margin-top:10px;
    padding:8px 15px;
    background:linear-gradient(to right,#ff69b4,#cc0066);
    color:white;
    border-radius:8px;
    text-decoration:none;
    transition:0.3s;
}
.btn:hover{ opacity:0.85; }
.card::before{
    content:'';
    position:absolute;
    inset:0;
    border-radius:12px;
    padding:2px;
    background:linear-gradient(45deg,#ff69b4,#ff1493,#cc0066);
    -webkit-mask:
        linear-gradient(#000 0 0) content-box,
        linear-gradient(#000 0 0);
    -webkit-mask-composite: xor;
    mask-composite: exclude;
    opacity:0;
    transition:0.4s;
}
.card:hover::before{ opacity:1; }
</style>
</head>

<body>

</nav>
