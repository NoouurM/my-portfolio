<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<!-- حل مشكل GitHub Pages -->
<base href="/my-portfolio/">

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nour | Portfolio</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
    font-family: 'Segoe UI', sans-serif;
    background:#0a0f1e;
    color:white;
    overflow-x:hidden;
}

/* NAVBAR */
nav{
    display:flex;
    justify-content:space-between;
    padding:20px 50px;
    background:rgba(255,255,255,0.05);
    backdrop-filter:blur(10px);
    position:sticky;
    top:0;
}
.logo{
    font-weight:bold;
    font-size:20px;
    background:linear-gradient(to right,#ff69b4,#cc0066);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}
.nav-links a{
    margin-left:20px;
    text-decoration:none;
    color:white;
    transition:0.3s;
}
.nav-links a:hover{
    color:#ff69b4;
}

/* HERO */
.hero{
    height:90vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
    animation:fadeIn 1.5s ease;
}
.hero h1{
    font-size:50px;
    background:linear-gradient(to right,#fff,#ff69b4);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}
.hero p{
    color:#aaa;
    margin:15px 0 30px;
}

/* BUTTONS */
.buttons a{
    padding:14px 30px;
    margin:10px;
    border-radius:10px;
    text-decoration:none;
    font-weight:bold;
    transition:0.3s;
}
.primary{
    background:linear-gradient(to right,#ff69b4,#cc0066);
    color:white;
}
.secondary{
    border:1px solid white;
    color:white;
}
.primary:hover{
    transform:translateY(-3px);
    box-shadow:0 10px 20px rgba(255,105,180,0.4);
}
.secondary:hover{
    color:#ff69b4;
    border-color:#ff69b4;
}

/* ANIMATION */
@keyframes fadeIn{
    from{opacity:0;transform:translateY(30px)}
    to{opacity:1;transform:translateY(0)}
}

/* RESPONSIVE */
@media(max-width:600px){
    nav{padding:15px}
    .hero h1{font-size:30px}
}
</style>
</head>

<body>

<nav>
    <div class="logo">Nour.dev</div>
    <div class="nav-links">
        <a href="index.html">Home</a>
        <a href="about.html">About</a>
        <a href="project.html">Projects</a>
        <a href="contact.html">Contact</a>
    </div>
</nav>

<section class="hero">
    <h1>Hi, I'm Nour 👋</h1>
    <p>Frontend Developer | UI Lover</p>

    <div class="buttons">
        <a href="project.html" class="primary">🚀 My Projects</a>
        <a href="contact.html" class="secondary">📩 Contact Me</a>
    </div>
</section>

</body>
</html>
